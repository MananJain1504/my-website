<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Knowledge Map</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b2a;
    --border: #1e2740;
    --accent: #4f8fff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,143,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,143,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
  }
  .orb-1 { width: 600px; height: 600px; background: #4f8fff; top: -200px; left: -200px; }
  .orb-2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; right: -100px; }
  .orb-3 { width: 300px; height: 300px; background: #10b981; top: 40%; left: 60%; }

  header {
    position: relative;
    z-index: 10;
    padding: 40px 60px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    background: rgba(79,143,255,0.08);
    border: 1px solid rgba(79,143,255,0.2);
    padding: 6px 14px;
    border-radius: 3px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--muted);
    font-size: 14px;
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  /* Phase nav */
  .phase-nav {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 0;
    padding: 20px 60px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .phase-nav::-webkit-scrollbar { display: none; }

  .phase-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border-right: none;
  }
  .phase-btn:first-child { border-radius: 4px 0 0 4px; }
  .phase-btn:last-child { border-radius: 0 4px 4px 0; border-right: 1px solid var(--border); }
  .phase-btn:hover { color: var(--text); background: var(--surface); }
  .phase-btn.active { color: white; border-color: transparent; }
  .phase-btn[data-phase="all"].active { background: var(--accent); }
  .phase-btn[data-phase="prereq"].active { background: #6366f1; }
  .phase-btn[data-phase="lib"].active { background: var(--accent3); }
  .phase-btn[data-phase="sc"].active { background: var(--accent4); }
  .phase-btn[data-phase="pipe"].active { background: var(--accent2); }
  .phase-btn[data-phase="pf"].active { background: var(--accent5); }

  /* Main layout */
  .main {
    position: relative;
    z-index: 10;
    padding: 40px 60px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* Domain group */
  .domain {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    transition: all 0.25s;
  }
  .domain.hidden { display: none; }

  .domain-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .domain-header:hover { background: rgba(255,255,255,0.03); }

  .domain-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .domain-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    flex: 1;
  }

  .domain-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .difficulty-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 3px 10px;
    border-radius: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .phase-tags {
    display: flex;
    gap: 4px;
  }

  .phase-tag {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    opacity: 0.8;
  }

  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
    font-family: var(--mono);
  }
  .domain.open .chevron { transform: rotate(90deg); }

  .domain-body {
    display: none;
    padding: 0;
  }
  .domain.open .domain-body { display: block; }

  /* Topic grid inside domain */
  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .topic-card {
    background: var(--surface);
    padding: 20px 24px;
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    text-align: left;
    color: inherit;
  }
  .topic-card:hover { background: rgba(79,143,255,0.05); }
  .topic-card.highlighted { background: rgba(79,143,255,0.1); border-left: 2px solid var(--accent); }

  .topic-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .topic-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .topic-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .where-used {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    border: 1px solid;
    opacity: 0.8;
  }

  .depth-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 420px;
    background: #0d1120;
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
    padding: 32px;
  }
  .detail-panel.open { transform: translateX(0); }

  .detail-close {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 24px;
    display: block;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }
  .detail-close:hover { color: var(--text); border-color: var(--accent); }

  .detail-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .detail-title {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .detail-desc {
    font-size: 14px;
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .detail-section {
    margin-bottom: 24px;
  }

  .detail-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .detail-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .detail-list li {
    font-size: 13px;
    color: #94a3b8;
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }

  .detail-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
  }

  .code-snippet {
    background: #0a0d14;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: #7dd3fc;
    line-height: 1.6;
    overflow-x: auto;
    margin-top: 8px;
  }

  .ref-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .ref-item strong {
    color: var(--accent3);
    font-family: var(--mono);
    font-size: 11px;
    display: block;
    margin-bottom: 2px;
  }

  /* Stats bar */
  .stats-bar {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 0;
    padding: 0 60px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stat {
    padding: 14px 24px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  /* Search */
  .search-wrap {
    padding: 16px 60px;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    max-width: 400px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* Expand all btn */
  .controls {
    display: flex;
    gap: 8px;
    padding: 12px 60px;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .ctrl-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { color: var(--text); border-color: var(--accent); }

  @media (max-width: 768px) {
    header, .phase-nav, .stats-bar, .search-wrap, .controls, .main {
      padding-left: 20px;
      padding-right: 20px;
    }
    .detail-panel { width: 100%; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<header>
  <div class="logo">MERIDIAN-SPEC</div>
  <h1>Knowledge Map — RV32I CPU Project</h1>
  <p>12 Weeks · 37 Instructions · Complete RTL</p>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num">6</div><div class="stat-label">Knowledge Domains</div></div>
  <div class="stat"><div class="stat-num" id="topic-count">32</div><div class="stat-label">Core Topics</div></div>
  <div class="stat"><div class="stat-num">5</div><div class="stat-label">Project Phases</div></div>
  <div class="stat"><div class="stat-num">37</div><div class="stat-label">Instructions to Implement</div></div>
  <div class="stat"><div class="stat-num">3</div><div class="stat-label">Pipeline Stages</div></div>
</div>

<div class="phase-nav">
  <button class="phase-btn active" data-phase="all">All Topics</button>
  <button class="phase-btn" data-phase="prereq">Prereqs</button>
  <button class="phase-btn" data-phase="lib">Phase: Modules</button>
  <button class="phase-btn" data-phase="sc">Phase: Single-Cycle</button>
  <button class="phase-btn" data-phase="pipe">Phase: Pipeline</button>
  <button class="phase-btn" data-phase="pf">Phase: Portfolio</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" placeholder="Search topics..." id="searchInput">
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="expandAll()">Expand All</button>
  <button class="ctrl-btn" onclick="collapseAll()">Collapse All</button>
</div>

<main class="main" id="mainContent"></main>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closePanel()">← Close</button>
  <div id="detailContent"></div>
</div>

<script>
const PHASE_COLORS = {
  prereq: '#6366f1',
  lib:    '#10b981',
  sc:     '#f59e0b',
  pipe:   '#7c3aed',
  pf:     '#ef4444',
};

const DOMAINS = [
  {
    id: 'digital',
    icon: '⚡',
    color: '#4f8fff',
    title: 'Digital Logic & Hardware Foundations',
    difficulty: 'Prerequisite',
    diffColor: '#6366f1',
    phases: ['prereq', 'lib'],
    topics: [
      {
        name: 'Boolean Algebra & Logic Gates',
        short: 'AND, OR, NOT, XOR, NAND, NOR. De Morgan\'s laws. The mathematical foundation of all digital hardware.',
        desc: 'Every signal in the MERIDIAN datapath ultimately reduces to combinations of logic gates. The ALU\'s AND/OR/XOR operations are direct hardware implementations of Boolean operators. De Morgan\'s theorem is used constantly when analyzing inverted control signals (active-low reset, write enables).',
        used: ['prereq', 'lib'],
        depth: 'Foundation',
        mustKnow: ['Truth tables for all basic gates', 'De Morgan\'s law: ~(A·B) = ~A+~B', 'NAND/NOR as universal gates', 'XOR as inequality detector (used in alu_zero flag)'],
        inProject: ['ALU bitwise operations (AND, OR, XOR, XORI)', 'Branch flag logic (alu_zero, alu_neg)', 'Control unit boolean expressions', 'Mux implementation'],
        code: '// XOR gate in SV\nassign alu_zero = ~|alu_result; // NOR-reduction\nassign alu_neg  =  alu_result[31];',
        ref: [{ title: 'Harris & Harris Ch. 1–2', note: 'Complete gate-level digital logic foundation.' }]
      },
      {
        name: 'Combinational vs Sequential Circuits',
        short: 'Combinational: output depends only on current inputs. Sequential: output depends on inputs AND stored state.',
        desc: 'MERIDIAN\'s entire datapath is a combination of these two types. The ALU, immediate generator, control unit, and all muxes are combinational — their outputs are valid as soon as inputs settle. The program counter, register file, and pipeline registers are sequential — they capture state on the clock edge.',
        used: ['prereq', 'lib', 'sc'],
        depth: 'Foundation',
        mustKnow: ['Propagation delay and why it determines max clock frequency', 'Setup and hold time constraints', 'always_comb vs always_ff in SystemVerilog', 'Latch vs flip-flop difference (latches are a design bug unless intentional)'],
        inProject: ['ALU is combinational (always_comb)', 'pc_reg is sequential (always_ff)', 'imem is combinational ROM', 'dmem write is sequential, read is combinational'],
        code: '// Sequential: PC register\nalways_ff @(posedge clk or negedge rst_n)\n  if (!rst_n) pc <= 32\'h0;\n  else        pc <= pc_next;\n\n// Combinational: ALU\nalways_comb begin\n  case (alu_ctrl)\n    ADD: alu_result = op_a + op_b;\n  endcase\nend',
        ref: [{ title: 'Harris & Harris Ch. 3', note: 'Sequential logic, flip-flops, timing analysis.' }]
      },
      {
        name: 'Adders and Arithmetic Circuits',
        short: 'Half adder, full adder, ripple-carry adder, carry-lookahead adder. Two\'s complement subtraction.',
        desc: 'The ALU\'s ADD operation is the most-used operation in RISC-V — loads, stores, branches, AUIPC, JAL, JALR, and ADDI all compute an addition. Understanding how adders work at the gate level explains the carry-out flag used for BLTU/BGEU, and why subtraction is just addition of the negated operand (A - B = A + (~B) + 1).',
        used: ['prereq', 'lib'],
        depth: 'Foundation',
        mustKnow: ['Two\'s complement representation and range (-2^31 to 2^31-1)', 'Subtraction via ~B+1 (inverter + carry-in=1)', 'Overflow conditions for signed arithmetic', 'Why carry-out ≠ overflow for signed numbers'],
        inProject: ['ALU ADD/SUB operations', 'Branch condition flags (carry, overflow, negative)', 'SLTU uses unsigned carry; SLT uses signed overflow'],
        code: '// Subtraction using 2\'s complement\n// A - B = A + (~B) + 1\nassign {carry_out, result} = \n  op_a + (~op_b) + 32\'b1; // when SUB\nassign overflow = \n  (op_a[31]==op_b[31]) && \n  (result[31]!=op_a[31]);',
        ref: [{ title: 'Harris & Harris Ch. 5.2', note: 'Adder circuits through carry-lookahead.' }]
      },
      {
        name: 'Multiplexers (Muxes)',
        short: 'N-to-1 data selector controlled by a select signal. The workhorse of datapath routing.',
        desc: 'MERIDIAN has at least 5 explicit muxes in the datapath: ALU operand A select, ALU operand B select, PC next select (3-way), and writeback select (3-way). Every time a signal needs to choose between sources based on the instruction type, a mux is the implementation. Understanding mux timing is critical for the critical path.',
        used: ['prereq', 'lib', 'sc'],
        depth: 'Foundation',
        mustKnow: ['2:1 and 4:1 mux implementation', 'Ternary operator in SV as 2:1 mux', 'Case statement for wider muxes', 'Mux on critical path adds propagation delay'],
        inProject: ['alu_src_a_sel: rs1 vs PC', 'alu_src_b_sel: rs2 vs imm_ext', 'pc_sel [1:0]: PC+4 vs branch vs jump', 'wb_sel [1:0]: ALU vs dmem vs PC+4'],
        code: '// 3-way PC mux\nassign pc_next = \n  (pc_sel == 2\'b10) ? pc_jump   :\n  (pc_sel == 2\'b01) ? pc_branch :\n                      pc_plus4;',
        ref: [{ title: 'Harris & Harris Ch. 2.4', note: 'Mux implementation and the concept of don\'t-cares.' }]
      },
      {
        name: 'Registers and Flip-Flops',
        short: 'D flip-flop: captures input on clock edge, holds it until next edge. Register = array of flip-flops.',
        desc: 'The register file is 32 × 32-bit D flip-flops (1024 flip-flops total). The PC register is one 32-bit register. Pipeline registers in Phase 3 will be wide bundles of flip-flops capturing the entire instruction context at each stage boundary. Understanding setup/hold time is essential for knowing why the pipeline clock period must be long enough.',
        used: ['prereq', 'lib', 'sc', 'pipe'],
        depth: 'Foundation',
        mustKnow: ['D flip-flop operation (capture on posedge)', 'Reset behavior (synchronous vs asynchronous)', 'Register enable (only capture when en=1)', 'Why registers define stage boundaries in a pipeline'],
        inProject: ['regfile: 32 × 32 flip-flop array', 'pc_reg: one 32-bit register with reset', 'Pipeline registers: IF/ID, ID/EX bundles', 'dmem write: synchronous (registered on clock)'],
        code: '// Register with enable\nalways_ff @(posedge clk)\n  if (wr_en && addr != 0)\n    regs[addr] <= wr_data;',
        ref: [{ title: 'Harris & Harris Ch. 3.2', note: 'D flip-flop through register arrays.' }]
      },
      {
        name: 'Number Systems & Representation',
        short: 'Binary, hexadecimal, two\'s complement. Sign extension. Unsigned vs signed interpretation.',
        desc: 'RISC-V carefully distinguishes signed and unsigned operations. LW vs LBU vs LB, SLT vs SLTU, BLT vs BLTU all differ only in signed vs unsigned interpretation of the same 32 bits. Understanding that the hardware stores bits and the instruction gives them meaning is fundamental.',
        used: ['prereq', 'lib', 'sc'],
        depth: 'Foundation',
        mustKnow: ['Convert hex ↔ binary ↔ decimal in your head for small values', 'Two\'s complement negation: flip all bits, add 1', 'Sign extension: replicate MSB leftward', 'Zero extension: fill with 0s (for LBU, LHU)'],
        inProject: ['imm_gen sign extension for all 5 formats', 'dmem sign_ext signal for loads', 'Branch condition signed vs unsigned'],
        code: '// Sign extension (I-type)\nassign imm_ext = {{20{instr[31]}}, instr[31:20]};\n// Zero extension (LBU)\nassign load_result = {24\'b0, dmem_byte};',
        ref: [{ title: 'P&H Appendix A', note: 'Number representation chapter — also explains IEEE 754 for context.' }]
      },
    ]
  },
  {
    id: 'sv',
    icon: '💻',
    color: '#10b981',
    title: 'SystemVerilog RTL Design',
    difficulty: 'Core Skill',
    diffColor: '#10b981',
    phases: ['lib', 'sc', 'pipe'],
    topics: [
      {
        name: 'SystemVerilog Module Structure',
        short: 'module/endmodule, port declarations, parameter, localparam. The fundamental unit of RTL design.',
        desc: 'Every MERIDIAN component is a SystemVerilog module. Knowing the exact syntax for port declarations (logic vs wire vs reg, input/output/inout), parameters for configurability (like MEM_DEPTH), and the difference between module instantiation and functional description is table-stakes for writing any RTL.',

// ─────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────
let currentPhase = 'all';
let openPanel = null;

function renderAll() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  DOMAINS.forEach(domain => {
    const el = buildDomain(domain);
    main.appendChild(el);
  });

  filterByPhase(currentPhase);
}

function buildDomain(domain) {
  const div = document.createElement('div');
  div.className = 'domain';
  div.dataset.domainId = domain.id;
  div.dataset.phases = domain.phases.join(',');

  const phaseDots = domain.phases.map(p =>
    `<div class="phase-tag" style="background:${PHASE_COLORS[p]}"></div>`
  ).join('');

  div.innerHTML = `
    <div class="domain-header" onclick="toggleDomain('${domain.id}')">
      <div class="domain-icon" style="background:${domain.color}22; color:${domain.color}">${domain.icon}</div>
      <div class="domain-title" style="color:${domain.color}">${domain.title}</div>
      <div class="domain-meta">
        <div class="phase-tags">${phaseDots}</div>
        <span class="difficulty-badge" style="background:${domain.diffColor}22; color:${domain.diffColor}; border:1px solid ${domain.diffColor}44">${domain.difficulty}</span>
        <span class="chevron">▶</span>
      </div>
    </div>
    <div class="domain-body">
      <div class="topics-grid" id="grid-${domain.id}"></div>
    </div>
  `;

  const grid = div.querySelector(`#grid-${domain.id}`);
  domain.topics.forEach(topic => {
    const card = buildTopicCard(topic, domain);
    grid.appendChild(card);
  });

  return div;
}

function buildTopicCard(topic, domain) {
  const btn = document.createElement('button');
  btn.className = 'topic-card';
  btn.dataset.phases = topic.used.join(',');
  btn.dataset.name = topic.name.toLowerCase();
  btn.dataset.desc = topic.short.toLowerCase();

  const tags = topic.used.map(p =>
    `<span class="where-used" style="color:${PHASE_COLORS[p]}; border-color:${PHASE_COLORS[p]}44">${p.toUpperCase()}</span>`
  ).join('');

  const depthColor = {
    'Foundation': '#6366f1',
    'Core': '#10b981',
    'Deep': '#7c3aed',
    'Practical': '#f59e0b',
    'Good Practice': '#06b6d4',
    'Process': '#64748b',
    'Career': '#ef4444'
  }[topic.depth] || '#64748b';

  btn.innerHTML = `
    <div class="topic-name">${topic.name}</div>
    <div class="topic-desc">${topic.short}</div>
    <div class="topic-footer">
      ${tags}
      <div style="margin-left:auto; display:flex; align-items:center; gap:6px;">
        <div class="depth-dot" style="background:${depthColor}"></div>
        <span style="font-size:10px; color:${depthColor}; font-family:var(--mono); letter-spacing:0.08em">${topic.depth}</span>
      </div>
    </div>
  `;

  btn.onclick = () => openDetailPanel(topic, domain);
  return btn;
}

function openDetailPanel(topic, domain) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const overlay = document.getElementById('overlay');

  const inProjectItems = (topic.inProject || []).map(i => `<li>${i}</li>`).join('');
  const mustKnowItems = (topic.mustKnow || []).map(i => `<li>${i}</li>`).join('');
  const refItems = (topic.ref || []).map(r =>
    `<div class="ref-item"><strong>${r.title}</strong>${r.note}</div>`
  ).join('');

  const tags = topic.used.map(p =>
    `<span class="where-used" style="color:${PHASE_COLORS[p]}; border-color:${PHASE_COLORS[p]}44; margin-right:6px">${p.toUpperCase()}</span>`
  ).join('');

  content.innerHTML = `
    <div class="detail-tag" style="color:${domain.color}">${domain.icon} ${domain.title}</div>
    <div class="detail-title">${topic.name}</div>
    <div style="margin-bottom:16px">${tags}</div>
    <div class="detail-desc">${topic.desc}</div>

    <div class="detail-section">
      <div class="detail-section-title">What You Must Know</div>
      <ul class="detail-list">${mustKnowItems}</ul>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Where It Appears in MERIDIAN</div>
      <ul class="detail-list">${inProjectItems}</ul>
    </div>

    ${topic.code ? `
    <div class="detail-section">
      <div class="detail-section-title">Code Sketch</div>
      <div class="code-snippet">${topic.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>` : ''}

    ${refItems ? `
    <div class="detail-section">
      <div class="detail-section-title">References</div>
      ${refItems}
    </div>` : ''}
  `;

  panel.classList.add('open');
  overlay.classList.add('active');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

function toggleDomain(id) {
  const el = document.querySelector(`[data-domain-id="${id}"]`);
  el.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.domain:not(.hidden)').forEach(d => d.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.domain').forEach(d => d.classList.remove('open'));
}

function filterByPhase(phase) {
  currentPhase = phase;
  document.querySelectorAll('.phase-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.phase === phase);
  });

  document.querySelectorAll('.domain').forEach(domain => {
    const domainPhases = domain.dataset.phases.split(',');
    const domainMatch = phase === 'all' || domainPhases.includes(phase);

    let anyVisible = false;
    domain.querySelectorAll('.topic-card').forEach(card => {
      const cardPhases = card.dataset.phases.split(',');
      const cardMatch = phase === 'all' || cardPhases.includes(phase);
      card.style.display = cardMatch ? '' : 'none';
      if (cardMatch) anyVisible = true;
    });

    domain.classList.toggle('hidden', !domainMatch && !anyVisible);
  });
}

function searchTopics(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.topic-card').forEach(card => {
    if (!q) {
      card.style.display = '';
      card.classList.remove('highlighted');
      return;
    }
    const match = card.dataset.name.includes(q) || card.dataset.desc.includes(q);
    card.style.display = match ? '' : 'none';
    card.classList.toggle('highlighted', match && q.length > 2);
  });

  // Show all domains when searching
  if (q) {
    document.querySelectorAll('.domain').forEach(d => {
      d.classList.remove('hidden');
      d.classList.add('open');
    });
  } else {
    filterByPhase(currentPhase);
  }
}

// Wire up events
document.querySelectorAll('.phase-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    filterByPhase(btn.dataset.phase);
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTopics(e.target.value);
});

// Init
renderAll();
// Open all by default
expandAll();
</script>
